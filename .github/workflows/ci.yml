name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select Xcode 26.3
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app
          xcodebuild -version

      - name: Install build tools
        run: bash Scripts/install-ci-tools.sh ast-grep xcodegen ripgrep actionlint shellcheck

      - name: Lint workflows and shell scripts
        run: |
          actionlint
          shellcheck Scripts/*.sh Scripts/lib/*.sh Scripts/tests/*.sh Scripts/tests/fixtures/*.sh .githooks/pre-commit

      - name: Run exact staged-source guardrail
        run: bash .githooks/pre-commit

      - name: Run script tests
        run: |
          for test_script in Scripts/tests/*.sh; do
            echo "==> ${test_script}"
            /bin/bash "${test_script}"
          done

      - name: Generate Xcode project
        run: |
          xcodegen generate
          bash Scripts/verify-entitlements.sh
          bash Scripts/verify-revenuecat-lock.sh

      - name: Compile watchOS arm64_32
        run: |
          xcodebuild \
            -project AIPedometer.xcodeproj \
            -target AIPedometerWatch \
            -configuration Debug \
            -sdk watchos \
            ARCHS=arm64_32 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SYMROOT="${RUNNER_TEMP}/aipedometer-watch-arm64_32/Build" \
            OBJROOT="${RUNNER_TEMP}/aipedometer-watch-arm64_32/Intermediates" \
            SHARED_PRECOMPS_DIR="${RUNNER_TEMP}/aipedometer-watch-arm64_32/PrecompiledHeaders" \
            build

      - name: Run E2E (iOS Simulator)
        run: |
          rm -rf output/e2e-ci
          E2E_OUT_DIR=output/e2e-ci \
          E2E_DERIVED_DATA_ROOT="${RUNNER_TEMP}/aipedometer-e2e-derived-data" \
          E2E_ENABLE_WATCH=0 \
          E2E_ENABLE_SCREENSHOTS=0 \
          E2E_ERASE_IOS_SIM=1 \
          E2E_UI_TEST_ITERATIONS=1 \
          bash Scripts/e2e-simulator.sh

      - name: Publish E2E summary
        if: always()
        run: |
          if [[ -f output/e2e-ci/summary.md ]]; then
            cat output/e2e-ci/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Resumo nao encontrado: output/e2e-ci/summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: |
            output/e2e-ci
            !output/e2e-ci/**/DerivedData*
