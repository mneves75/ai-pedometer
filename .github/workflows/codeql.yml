name: CodeQL

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "17 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: macos-15
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        language: [swift]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Select newest Xcode 26.x
        run: |
          XCODE_PATH="$(printf '%s\n' /Applications/Xcode_26*.app | sort -V | tail -n 1)"
          if [[ ! -d "${XCODE_PATH}" ]]; then
            echo "No Xcode 26.x installation found under /Applications" >&2
            exit 1
          fi
          sudo xcode-select -s "${XCODE_PATH}"
          xcodebuild -version

      - name: Install XcodeGen
        run: bash Scripts/install-ci-tools.sh xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          bash Scripts/verify-entitlements.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: ${{ matrix.language }}

      - name: Build for CodeQL
        run: |
          xcodebuild \
            -scheme AIPedometer \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: "/language:${{ matrix.language }}"
